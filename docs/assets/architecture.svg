<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 700" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101a30"/>
    </linearGradient>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5b7cc0"/>
    </marker>
    <marker id="ad" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c89a8"/>
    </marker>
    <style>
      .box{fill:#16223b;stroke:#2b3a5c;stroke-width:1.5;}
      .t{fill:#e8eefb;font-weight:700;}
      .s{fill:#93a4c3;}
      .flow{stroke:#5b7cc0;stroke-width:2.5;}
      .dash{stroke:#7c89a8;stroke-width:2;stroke-dasharray:6 5;}
    </style>
  </defs>

  <rect width="1240" height="700" rx="20" fill="url(#bg2)"/>
  <rect x="40" y="40" width="6" height="34" rx="3" fill="#38bdf8"/>
  <text x="60" y="62" font-size="27" class="t">Production Architecture &amp; Workflow</text>
  <text x="60" y="90" font-size="15" class="s">How a request is served, how the model is trained offline, and how the service ships to production.</text>
  <line x1="40" y1="106" x2="1200" y2="106" stroke="#22314f" stroke-width="1"/>

  <!-- ===================== LANE 1: SERVE ===================== -->
  <rect x="40" y="120" width="78" height="24" rx="12" fill="#0e3a52"/>
  <text x="79" y="137" font-size="12" font-weight="700" fill="#7dd3fc" text-anchor="middle">SERVE</text>

  <!-- Clients -->
  <rect class="box" x="40" y="152" width="160" height="92" rx="12"/>
  <text x="120" y="192" font-size="15" class="t" text-anchor="middle">Clients</text>
  <text x="120" y="214" font-size="12" class="s" text-anchor="middle">Swagger UI · curl</text>
  <text x="120" y="230" font-size="12" class="s" text-anchor="middle">apps · services</text>
  <line x1="200" y1="198" x2="238" y2="198" class="flow" marker-end="url(#a)"/>

  <!-- Uvicorn -->
  <rect class="box" x="240" y="152" width="128" height="92" rx="12"/>
  <text x="304" y="194" font-size="15" class="t" text-anchor="middle">Uvicorn</text>
  <text x="304" y="214" font-size="12" class="s" text-anchor="middle">ASGI server</text>
  <line x1="368" y1="198" x2="398" y2="198" class="flow" marker-end="url(#a)"/>

  <!-- FastAPI container -->
  <rect x="400" y="140" width="800" height="104" rx="14" fill="#12203c" stroke="#38507e" stroke-width="1.5"/>
  <text x="416" y="160" font-size="13" font-weight="700" fill="#7dd3fc">FastAPI application</text>
  <rect class="box" x="430" y="170" width="190" height="58" rx="10"/>
  <text x="525" y="195" font-size="13.5" class="t" text-anchor="middle">API Router</text>
  <text x="525" y="214" font-size="11.5" class="s" text-anchor="middle">/predict · /health</text>
  <line x1="620" y1="199" x2="700" y2="199" class="flow" marker-end="url(#a)"/>
  <rect class="box" x="705" y="170" width="190" height="58" rx="10"/>
  <text x="800" y="195" font-size="13.5" class="t" text-anchor="middle">Pydantic v2</text>
  <text x="800" y="214" font-size="11.5" class="s" text-anchor="middle">request validation</text>
  <line x1="895" y1="199" x2="975" y2="199" class="flow" marker-end="url(#a)"/>
  <rect class="box" x="980" y="170" width="190" height="58" rx="10"/>
  <text x="1075" y="195" font-size="13.5" class="t" text-anchor="middle">Model Service</text>
  <text x="1075" y="214" font-size="11.5" class="s" text-anchor="middle">predict()</text>

  <!-- ===================== LANE 2: TRAIN ===================== -->
  <rect x="40" y="272" width="140" height="24" rx="12" fill="#33235c"/>
  <text x="110" y="289" font-size="12" font-weight="700" fill="#c4b5fd" text-anchor="middle">TRAIN · offline</text>

  <rect class="box" x="40" y="304" width="180" height="92" rx="12"/>
  <text x="130" y="344" font-size="14" class="t" text-anchor="middle">California Housing</text>
  <text x="130" y="364" font-size="12" class="s" text-anchor="middle">scikit-learn dataset</text>
  <line x1="220" y1="350" x2="256" y2="350" class="flow" marker-end="url(#a)"/>

  <rect class="box" x="258" y="304" width="286" height="92" rx="12"/>
  <text x="401" y="338" font-size="14" class="t" text-anchor="middle">scikit-learn Pipeline</text>
  <text x="401" y="360" font-size="11.5" class="s" text-anchor="middle">StandardScaler &#8594;</text>
  <text x="401" y="376" font-size="11.5" class="s" text-anchor="middle">GradientBoostingRegressor</text>
  <line x1="544" y1="350" x2="580" y2="350" class="flow" marker-end="url(#a)"/>

  <rect class="box" x="582" y="304" width="196" height="92" rx="12"/>
  <text x="680" y="344" font-size="14" class="t" text-anchor="middle">Evaluate</text>
  <text x="680" y="364" font-size="12" class="s" text-anchor="middle">R² · MAE · RMSE</text>
  <line x1="778" y1="350" x2="814" y2="350" class="flow" marker-end="url(#a)"/>

  <rect x="816" y="304" width="204" height="92" rx="12" fill="#1b2a12" stroke="#3f5a1e" stroke-width="1.5"/>
  <text x="918" y="340" font-size="14" font-weight="700" fill="#d9f99d" text-anchor="middle">model.joblib</text>
  <text x="918" y="362" font-size="11.5" fill="#a3b18a" text-anchor="middle">versioned artifact</text>
  <text x="918" y="378" font-size="11.5" fill="#a3b18a" text-anchor="middle">estimator + metrics</text>

  <!-- artifact loaded into Model Service (dashed, upward) -->
  <path d="M990,304 C1030,270 1060,250 1075,232" fill="none" class="dash" marker-end="url(#ad)"/>
  <text x="1096" y="270" font-size="11" fill="#9aa7c2">loaded at startup</text>

  <!-- ===================== LANE 3: SHIP ===================== -->
  <rect x="40" y="424" width="118" height="24" rx="12" fill="#0d3b2e"/>
  <text x="99" y="441" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">SHIP · CI/CD</text>

  <rect class="box" x="40" y="456" width="150" height="88" rx="12"/>
  <text x="115" y="496" font-size="14" class="t" text-anchor="middle">GitHub</text>
  <text x="115" y="516" font-size="12" class="s" text-anchor="middle">push · PR</text>
  <line x1="190" y1="500" x2="226" y2="500" class="flow" marker-end="url(#a)"/>

  <rect class="box" x="228" y="456" width="262" height="88" rx="12"/>
  <text x="359" y="492" font-size="14" class="t" text-anchor="middle">GitHub Actions CI</text>
  <text x="359" y="514" font-size="11.5" class="s" text-anchor="middle">ruff · black · mypy · pytest</text>
  <line x1="490" y1="500" x2="526" y2="500" class="flow" marker-end="url(#a)"/>

  <rect class="box" x="528" y="456" width="180" height="88" rx="12"/>
  <text x="618" y="492" font-size="14" class="t" text-anchor="middle">Docker build</text>
  <text x="618" y="514" font-size="11.5" class="s" text-anchor="middle">multi-stage image</text>
  <line x1="708" y1="500" x2="744" y2="500" class="flow" marker-end="url(#a)"/>

  <rect class="box" x="746" y="456" width="170" height="88" rx="12"/>
  <text x="831" y="492" font-size="14" class="t" text-anchor="middle">Registry</text>
  <text x="831" y="514" font-size="11.5" class="s" text-anchor="middle">GHCR</text>
  <line x1="916" y1="500" x2="952" y2="500" class="flow" marker-end="url(#a)"/>

  <rect class="box" x="954" y="456" width="246" height="88" rx="12"/>
  <text x="1077" y="492" font-size="14" class="t" text-anchor="middle">Deploy</text>
  <text x="1077" y="514" font-size="11.5" class="s" text-anchor="middle">Render · Cloud Run · Fly.io</text>

  <!-- deploy runs the container (dashed vertical) -->
  <path d="M1188,456 L1188,244" fill="none" class="dash" marker-end="url(#ad)"/>
  <text x="1178" y="360" font-size="11" fill="#9aa7c2" text-anchor="end" transform="rotate(-90 1178 360)">ships &amp; runs the container</text>

  <!-- ===================== TECH STACK ===================== -->
  <line x1="40" y1="580" x2="1200" y2="580" stroke="#22314f" stroke-width="1"/>
  <text x="40" y="608" font-size="14" font-weight="700" fill="#e8eefb">Tech stack</text>
  <g font-size="12.5" fill="#cdd8ec">
    <rect x="40"  y="622" width="120" height="32" rx="8" fill="#1e2c49"/><text x="100"  y="643" text-anchor="middle">Python 3.11+</text>
    <rect x="170" y="622" width="92"  height="32" rx="8" fill="#1e2c49"/><text x="216"  y="643" text-anchor="middle">FastAPI</text>
    <rect x="272" y="622" width="112" height="32" rx="8" fill="#1e2c49"/><text x="328"  y="643" text-anchor="middle">Pydantic v2</text>
    <rect x="394" y="622" width="118" height="32" rx="8" fill="#1e2c49"/><text x="453"  y="643" text-anchor="middle">scikit-learn</text>
    <rect x="522" y="622" width="82"  height="32" rx="8" fill="#1e2c49"/><text x="563"  y="643" text-anchor="middle">NumPy</text>
    <rect x="614" y="622" width="80"  height="32" rx="8" fill="#1e2c49"/><text x="654"  y="643" text-anchor="middle">joblib</text>
    <rect x="704" y="622" width="92"  height="32" rx="8" fill="#1e2c49"/><text x="750"  y="643" text-anchor="middle">Uvicorn</text>
    <rect x="806" y="622" width="86"  height="32" rx="8" fill="#1e2c49"/><text x="849"  y="643" text-anchor="middle">Docker</text>
    <rect x="902" y="622" width="140" height="32" rx="8" fill="#1e2c49"/><text x="972"  y="643" text-anchor="middle">GitHub Actions</text>
    <rect x="1052" y="622" width="84" height="32" rx="8" fill="#1e2c49"/><text x="1094" y="643" text-anchor="middle">Render</text>
  </g>

  <!-- legend -->
  <line x1="820" y1="602" x2="850" y2="602" class="dash"/>
  <text x="858" y="606" font-size="11" fill="#9aa7c2">dashed = artifact &amp; deployment handoffs</text>
</svg>
