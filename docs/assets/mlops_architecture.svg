<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101a30"/>
    </linearGradient>
    <marker id="fa" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5b7cc0"/>
    </marker>
    <marker id="pass" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/>
    </marker>
    <marker id="loop" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fb7185"/>
    </marker>
    <marker id="fail" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f87171"/>
    </marker>
    <style>
      .box{fill:#16223b;stroke:#2b3a5c;stroke-width:1.5;}
      .title{fill:#e8eefb;font-weight:700;}
      .sub{fill:#93a4c3;}
      .chip{fill:#1e2c49;}
      .chiptxt{fill:#cdd8ec;}
      .num{fill:#08111f;font-weight:800;}
      .flow{stroke:#5b7cc0;stroke-width:2.5;}
    </style>
  </defs>

  <rect width="1280" height="760" rx="20" fill="url(#mbg)"/>
  <rect x="40" y="40" width="6" height="34" rx="3" fill="#2dd4bf"/>
  <text x="60" y="62" font-size="27" class="title">MLOps Lifecycle &#8212; House Price Prediction</text>
  <text x="60" y="90" font-size="15" class="sub">End-to-end pipeline: build and validate the model, ship it through CI/CD, serve it, and monitor it &#8212; with an automated retrain loop.</text>
  <line x1="40" y1="106" x2="1240" y2="106" stroke="#22314f" stroke-width="1"/>

  <!-- phase tags -->
  <rect x="40" y="120" width="176" height="24" rx="12" fill="#0e3a52"/>
  <text x="128" y="137" font-size="12" font-weight="700" fill="#7dd3fc" text-anchor="middle">1 · BUILD &amp; VALIDATE</text>
  <rect x="1064" y="400" width="176" height="24" rx="12" fill="#0d3b2e"/>
  <text x="1152" y="417" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">2 · SHIP &amp; OPERATE</text>

  <!-- ================= ROW A : build & validate (L to R) ================= -->
  <!-- Card 1 Data -->
  <rect class="box" x="40" y="150" width="270" height="110" rx="14"/>
  <circle cx="72" cy="184" r="16" fill="#38bdf8"/><text x="72" y="189" font-size="15" class="num" text-anchor="middle">1</text>
  <text x="98" y="189" font-size="15.5" class="title">Data Ingestion</text>
  <text x="60" y="220" font-size="12.5" class="sub">California Housing dataset</text>
  <rect class="chip" x="60" y="230" width="170" height="24" rx="8"/><text x="70" y="246" font-size="11.5" class="chiptxt">scikit-learn dataset</text>

  <!-- Card 2 Feature -->
  <rect class="box" x="350" y="150" width="270" height="110" rx="14"/>
  <circle cx="382" cy="184" r="16" fill="#22d3ee"/><text x="382" y="189" font-size="15" class="num" text-anchor="middle">2</text>
  <text x="408" y="189" font-size="15.5" class="title">Feature Engineering</text>
  <text x="370" y="220" font-size="12.5" class="sub">Scale &amp; prepare inputs</text>
  <rect class="chip" x="370" y="230" width="140" height="24" rx="8"/><text x="380" y="246" font-size="11.5" class="chiptxt">StandardScaler</text>

  <!-- Card 3 Training -->
  <rect class="box" x="660" y="150" width="270" height="110" rx="14"/>
  <circle cx="692" cy="184" r="16" fill="#2dd4bf"/><text x="692" y="189" font-size="15" class="num" text-anchor="middle">3</text>
  <text x="718" y="189" font-size="15.5" class="title">Model Training</text>
  <text x="680" y="220" font-size="12.5" class="sub">Reproducible pipeline</text>
  <rect class="chip" x="680" y="230" width="222" height="24" rx="8"/><text x="690" y="246" font-size="11.5" class="chiptxt">GradientBoostingRegressor</text>

  <!-- Card 4 Evaluation + Gate -->
  <rect class="box" x="970" y="150" width="270" height="110" rx="14" stroke="#7a6320"/>
  <circle cx="1002" cy="184" r="16" fill="#fbbf24"/><text x="1002" y="189" font-size="15" class="num" text-anchor="middle">4</text>
  <text x="1028" y="189" font-size="15.5" class="title">Evaluation + Gate</text>
  <text x="980" y="220" font-size="12.5" class="sub">R&#178; &#183; MAE &#183; RMSE</text>
  <rect class="chip" x="980" y="230" width="200" height="24" rx="8" fill="#3a2f13"/><text x="990" y="246" font-size="11.5" fill="#fcd34d">quality gate &#183; R&#178; &#8805; 0.75</text>

  <!-- row A flow arrows -->
  <line x1="310" y1="205" x2="348" y2="205" class="flow" marker-end="url(#fa)"/>
  <line x1="620" y1="205" x2="658" y2="205" class="flow" marker-end="url(#fa)"/>
  <line x1="930" y1="205" x2="968" y2="205" class="flow" marker-end="url(#fa)"/>

  <!-- ================= GATE branch ================= -->
  <!-- PASS: straight down into Model Registry -->
  <line x1="1105" y1="262" x2="1105" y2="428" stroke="#34d399" stroke-width="2.5" marker-end="url(#pass)"/>
  <rect x="1052" y="330" width="106" height="28" rx="14" fill="#0d3b2e"/>
  <text x="1105" y="349" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">PASS &#10003;</text>
  <!-- FAIL: dashed red to block -->
  <path d="M1000,258 C930,285 900,300 878,318" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#fail)"/>
  <rect x="640" y="320" width="238" height="30" rx="10" fill="#3a1717" stroke="#7f1d1d"/>
  <text x="759" y="340" font-size="12" fill="#fca5a5" text-anchor="middle">&#10007; FAIL &#8594; block deploy (FailStep)</text>

  <!-- ================= ROW B : ship & operate (R to L) ================= -->
  <!-- Card 5 Registry -->
  <rect class="box" x="970" y="430" width="270" height="110" rx="14"/>
  <circle cx="1002" cy="464" r="16" fill="#a78bfa"/><text x="1002" y="469" font-size="15" class="num" text-anchor="middle">5</text>
  <text x="1028" y="469" font-size="15.5" class="title">Model Registry</text>
  <text x="980" y="500" font-size="12.5" class="sub">Versioned, promotable artifact</text>
  <rect class="chip" x="980" y="510" width="210" height="24" rx="8"/><text x="990" y="526" font-size="11.5" class="chiptxt">model.joblib (versioned)</text>

  <!-- Card 6 CI/CD -->
  <rect class="box" x="660" y="430" width="270" height="110" rx="14"/>
  <circle cx="692" cy="464" r="16" fill="#34d399"/><text x="692" y="469" font-size="15" class="num" text-anchor="middle">6</text>
  <text x="718" y="469" font-size="15.5" class="title">CI/CD</text>
  <text x="680" y="500" font-size="12.5" class="sub">Automated build &amp; checks</text>
  <rect class="chip" x="680" y="510" width="230" height="24" rx="8"/><text x="690" y="526" font-size="11.5" class="chiptxt">GitHub Actions &#183; Docker &#183; GHCR</text>

  <!-- Card 7 Deploy/Serve -->
  <rect class="box" x="350" y="430" width="270" height="110" rx="14"/>
  <circle cx="382" cy="464" r="16" fill="#60a5fa"/><text x="382" y="469" font-size="15" class="num" text-anchor="middle">7</text>
  <text x="408" y="469" font-size="15.5" class="title">Deploy &amp; Serve</text>
  <text x="370" y="500" font-size="12.5" class="sub">Container on a cloud host</text>
  <rect class="chip" x="370" y="510" width="235" height="24" rx="8"/><text x="380" y="526" font-size="11.5" class="chiptxt">FastAPI &#183; Uvicorn &#183; Render</text>

  <!-- Card 8 Monitoring -->
  <rect class="box" x="40" y="430" width="270" height="110" rx="14"/>
  <circle cx="72" cy="464" r="16" fill="#fb7185"/><text x="72" y="469" font-size="15" class="num" text-anchor="middle">8</text>
  <text x="98" y="469" font-size="15.5" class="title">Monitoring</text>
  <text x="60" y="500" font-size="12.5" class="sub">Health, logs &amp; drift</text>
  <rect class="chip" x="60" y="510" width="215" height="24" rx="8"/><text x="70" y="526" font-size="11.5" class="chiptxt">/health &#183; metrics &#183; alerts</text>

  <!-- row B flow arrows (pointing left) -->
  <line x1="970" y1="485" x2="932" y2="485" class="flow" marker-end="url(#fa)"/>
  <line x1="660" y1="485" x2="622" y2="485" class="flow" marker-end="url(#fa)"/>
  <line x1="350" y1="485" x2="312" y2="485" class="flow" marker-end="url(#fa)"/>

  <!-- ================= retrain loop (Monitoring -> Data) ================= -->
  <line x1="175" y1="430" x2="175" y2="262" stroke="#fb7185" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#loop)"/>
  <text x="166" y="348" font-size="11.5" fill="#fda4af" text-anchor="middle" transform="rotate(-90 166 348)">data drift &#8594; retrain</text>

  <!-- ================= legend ================= -->
  <line x1="40" y1="600" x2="1240" y2="600" stroke="#22314f" stroke-width="1"/>
  <line x1="60" y1="632" x2="96" y2="632" class="flow" marker-end="url(#fa)"/>
  <text x="106" y="636" font-size="12" fill="#9aa7c2">pipeline flow</text>
  <line x1="240" y1="632" x2="276" y2="632" stroke="#34d399" stroke-width="2.5" marker-end="url(#pass)"/>
  <text x="286" y="636" font-size="12" fill="#9aa7c2">quality gate pass</text>
  <line x1="440" y1="632" x2="476" y2="632" stroke="#f87171" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#fail)"/>
  <text x="486" y="636" font-size="12" fill="#9aa7c2">gate fail &#183; deployment blocked</text>
  <line x1="720" y1="632" x2="756" y2="632" stroke="#fb7185" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#loop)"/>
  <text x="766" y="636" font-size="12" fill="#9aa7c2">automated retrain loop</text>

  <text x="40" y="690" font-size="12.5" font-weight="700" fill="#e8eefb">Stack:</text>
  <text x="92" y="690" font-size="12.5" fill="#9fb0cd">Python 3.11+ &#183; scikit-learn &#183; FastAPI &#183; Pydantic v2 &#183; joblib &#183; pytest / ruff / black / mypy &#183; Docker &#183; GitHub Actions &#183; Render</text>
</svg>
